server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/xml+rss;

    # WICHTIG: Keine CSP hier setzen! Die App liefert ihre eigene CSP per
    # <meta http-equiv="Content-Security-Policy"> in BaseLayout.astro aus.
    # Browser wenden bei mehreren CSPs (Header + Meta) die Schnittmenge an -
    # eine zweite, abweichende CSP hier wuerde exakt den Bug von vorher
    # reproduzieren (Buttons/Navigation live tot, lokal funktional).
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Fingerprinted Assets (Vite/Astro) unbegrenzt cachen
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /fonts/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # trailingSlash: 'always' + build.format: 'directory'
    # -> jede Route ist ein Ordner mit index.html
    location / {
        try_files $uri $uri/index.html $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
